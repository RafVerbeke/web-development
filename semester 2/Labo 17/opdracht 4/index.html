<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form>
    <label>
        <input type="checkbox" id="isRoker"> Is roker
    </label><br><br>

    <label>Moedertaal:</label><br>
    <input type="radio" name="taal" value="nl" checked> Nederlands
    <input type="radio" name="taal" value="fr"> Frans
    <input type="radio" name="taal" value="en"> Engels<br><br>

    <label for="buurland">Favoriete buurland:</label>

        <option value="Nederland">Nederland</option>
        <option value="Frankrijk">Frankrijk</option>
        <option value="Duitsland">Duitsland</option>
    </select><br><br>

    <label for="bestelling">Bestelling:</label><br>
    <select id="bestelling" multiple size="6">
        <option value="aardappelen">aardappelen</option>
        <option value="brood">brood</option>
        <option value="melk">melk</option>
        <option value="biefstuk">biefstuk</option>
        <option value="chips">chips</option>
        <option value="krant">krant</option>
    </select><br><br>

    <button type="button" id="btnToon">Toon resultaat</button>
</form>

</body>
</html>
