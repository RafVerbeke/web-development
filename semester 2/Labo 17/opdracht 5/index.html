<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form id="validatieForm">
    <div>
        <label>Voornaam:</label>
        <input type="text" id="voornaam">
        <span id="errVoornaam"></span>
    </div>
    <div>
        <label>Familienaam:</label>
        <input type="text" id="familienaam">
        <span id="errFamilienaam"></span>
    </div>
    <div>
        <label>Geboortedatum (jjjj-mm-dd):</label>
        <input type="text" id="geboortedatum">
        <span id="errGeboortedatum"></span>
    </div>
    <div>
        <label>Email:</label>
        <input type="text" id="email">
        <span id="errEmail"></span>
    </div>
    <div>
        <label>Aantal kinderen:</label>
        <input type="text" id="kinderen">
        <span id="errKinderen"></span>
    </div>
    <br>
    <button type="button" id="btnValideer">Valideer</button>
</form>
</body>
</html>
